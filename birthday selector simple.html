<!DOCTYPE html>
<html lang="zh-Hant">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>🎂 為妳準備的六款生日方案</title>
  <style>
    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
    }

    body {
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', 'Noto Sans CJK TC', 'Microsoft JhengHei', sans-serif;
      background: white;
      color: #333;
    }

    .header {
      background: linear-gradient(to right, #faf5f0, #fce7f3, #f0f9ff);
      padding: 48px 16px;
      text-align: center;
    }

    .header h1 {
      font-size: 48px;
      font-weight: 900;
      color: #111;
      margin-bottom: 8px;
    }

    .header p {
      font-size: 20px;
      color: #666;
      font-weight: 500;
      margin-bottom: 8px;
    }

    .header .subtitle {
      font-size: 14px;
      color: #999;
    }

    .container {
      max-width: 1200px;
      margin: 0 auto;
      padding: 48px 16px;
    }

    .cards-grid {
      display: grid;
      grid-template-columns: repeat(auto-fit, minmax(300px, 1fr));
      gap: 24px;
      margin-bottom: 48px;
    }

    .plan-card {
      border-radius: 16px;
      padding: 32px;
      cursor: pointer;
      transition: all 0.3s ease;
      box-shadow: 0 4px 6px rgba(0, 0, 0, 0.1);
      min-height: 380px;
      display: flex;
      flex-direction: column;
    }

    .plan-card:hover {
      box-shadow: 0 20px 40px rgba(0, 0, 0, 0.1);
      transform: translateY(-4px);
    }

    .plan-card.selected {
      box-shadow: 0 0 0 4px #fbbf24;
      transform: scale(1.05);
    }

    .plan-tag {
      display: inline-block;
      font-size: 12px;
      font-weight: 700;
      letter-spacing: 0.1em;
      padding: 8px 16px;
      border-radius: 20px;
      margin-bottom: 16px;
      width: fit-content;
    }

    .plan-emoji {
      font-size: 48px;
      margin-bottom: 16px;
    }

    .plan-title {
      font-size: 24px;
      font-weight: 900;
      line-height: 1.3;
      margin-bottom: 8px;
      white-space: pre-line;
    }

    .plan-subtitle {
      font-size: 14px;
      font-weight: 600;
      letter-spacing: 0.1em;
      margin-bottom: 20px;
    }

    .plan-description {
      font-size: 14px;
      line-height: 1.6;
      margin-bottom: 24px;
      flex-grow: 1;
      opacity: 0.9;
    }

    .plan-button {
      width: 100%;
      padding: 12px;
      border: none;
      border-radius: 8px;
      font-weight: 700;
      cursor: pointer;
      font-size: 14px;
      letter-spacing: 0.05em;
      transition: all 0.3s ease;
    }

    .plan-button:hover {
      box-shadow: 0 10px 20px rgba(0, 0, 0, 0.15);
    }

    .detail-view {
      display: none;
      animation: fadeIn 0.6s ease-in;
    }

    .detail-view.active {
      display: block;
    }

    @keyframes fadeIn {
      from {
        opacity: 0;
        transform: translateY(10px);
      }
      to {
        opacity: 1;
        transform: translateY(0);
      }
    }

    .back-button {
      background: none;
      border: none;
      font-size: 14px;
      font-weight: 700;
      color: #666;
      cursor: pointer;
      margin-bottom: 16px;
      letter-spacing: 0.05em;
    }

    .back-button:hover {
      color: #111;
    }

    .detail-card {
      border-radius: 16px;
      padding: 40px;
      box-shadow: 0 20px 40px rgba(0, 0, 0, 0.1);
    }

    .detail-title {
      font-size: 48px;
      font-weight: 900;
      line-height: 1.2;
      margin-bottom: 12px;
      white-space: pre-line;
    }

    .detail-subtitle {
      font-size: 18px;
      font-weight: 600;
      letter-spacing: 0.1em;
      margin-bottom: 32px;
    }

    .divider {
      height: 6px;
      width: 80px;
      opacity: 0.2;
      margin-bottom: 32px;
    }

    .detail-section {
      margin-bottom: 32px;
    }

    .detail-label {
      font-size: 12px;
      font-weight: 700;
      letter-spacing: 0.2em;
      margin-bottom: 12px;
      opacity: 0.8;
    }

    .detail-text {
      font-size: 18px;
      line-height: 1.6;
      margin-bottom: 16px;
    }

    .detail-item {
      margin-bottom: 24px;
    }

    .detail-item strong {
      display: block;
      font-size: 16px;
      font-weight: 700;
      margin-bottom: 4px;
    }

    .detail-item span {
      display: block;
      font-size: 16px;
      opacity: 0.9;
    }

    .best-for-box {
      border-radius: 12px;
      padding: 24px;
      border: 2px solid;
      border-opacity: 0.2;
      background-color: rgba(0, 0, 0, 0.02);
    }

    .best-for-box .label {
      font-size: 12px;
      font-weight: 700;
      letter-spacing: 0.2em;
      margin-bottom: 8px;
    }

    .best-for-box p {
      font-size: 16px;
      line-height: 1.6;
    }

    .action-buttons {
      display: flex;
      gap: 16px;
      margin-top: 32px;
      flex-wrap: wrap;
      justify-content: center;
    }

    .action-buttons button {
      flex: 1;
      min-width: 200px;
      padding: 16px 32px;
      border-radius: 8px;
      font-weight: 700;
      cursor: pointer;
      font-size: 16px;
      letter-spacing: 0.05em;
      border: none;
      transition: all 0.3s ease;
    }

    .copy-button {
      box-shadow: 0 4px 6px rgba(0, 0, 0, 0.1);
    }

    .copy-button:hover {
      box-shadow: 0 10px 20px rgba(0, 0, 0, 0.15);
      transform: scale(1.02);
    }

    .back-detail-button {
      background: white;
      border: 2px solid #d1d5db;
      color: #333;
    }

    .back-detail-button:hover {
      background: #f9fafb;
    }

    .confirmation {
      text-align: center;
      margin-top: 32px;
    }

    .confirmation h2 {
      font-size: 32px;
      font-weight: 900;
      margin-bottom: 12px;
    }

    .confirmation p {
      font-size: 16px;
      opacity: 0.8;
    }

    .footer {
      background: #f9fafb;
      padding: 32px 16px;
      text-align: center;
      margin-top: 48px;
    }

    .footer p {
      font-size: 14px;
      color: #666;
    }

    .footer .bold {
      font-weight: 700;
      font-size: 16px;
      color: #333;
      margin-bottom: 12px;
    }
  </style>
</head>
<body>

    <p>為妳精心準備六個方案，選一個最想要的慶生方式吧！</p>
    <p class="subtitle">點選卡片查看詳情 ✨</p>

    function createCard(plan) {
      const card = document.createElement('div');
      card.className = 'plan-card';
      card.style.background = plan.bgColor;
      card.style.color = plan.textColor;
      card.onclick = () => showDetail(plan.id);
      
      card.innerHTML = `
        <div class="plan-emoji">${plan.emoji}</div>
        <span class="plan-tag" style="background: ${plan.tagBg}; color: ${plan.tagText};">${plan.id} 方案</span>
        <h2 class="plan-title">${plan.title}</h2>
        <p class="plan-subtitle" style="color: ${plan.accentColor};">${plan.subtitle}</p>
        <p class="plan-description">${plan.description}</p>
        <button class="plan-button" style="background: ${plan.tagBg}; color: ${plan.tagText};">查看詳情</button>
      `;
      return card;
    }

    function showDetail(planId) {
      const email = document.getElementById('userEmail').value;
      if (!email) {
        alert('請先填寫妳的 Email 喔！');
        document.getElementById('userEmail').focus();
        return;
      }

      const plan = plans.find(p => p.id === planId);
      const cardsContainer = document.getElementById('cardsContainer');
      const detailView = document.getElementById('detailView');

      cardsContainer.style.display = 'none';
      detailView.classList.add('active');

      let detailsHTML = plan.details.map(d => 
        `<div class="detail-item"><strong style="color: ${plan.accentColor};">✓ ${d.label}</strong><span>${d.value}</span></div>`
      ).join('');

      detailView.innerHTML = `
        <button class="back-button" onclick="goBack()">← 看其他方案</button>
        <div class="detail-card" style="background: ${plan.bgColor}; color: ${plan.textColor};">
          <div style="max-width: 800px; margin: 0 auto;">
            <div style="font-size: 60px; margin-bottom: 16px;">${plan.emoji}</div>
            <h1 class="detail-title">${plan.title}</h1>
            <p class="detail-subtitle" style="color: ${plan.accentColor};">${plan.subtitle}</p>
            <div class="divider" style="background: ${plan.textColor};"></div>
            
            <div class="detail-section">
              <p class="detail-label" style="color: ${plan.accentColor};">為 妳 而 寫</p>
              <p class="detail-text">${plan.description}</p>
            </div>

            <div class="detail-section">
              <p class="detail-label" style="color: ${plan.accentColor};">方 案 詳 情</p>
              ${detailsHTML}
            </div>

            <div class="best-for-box" style="border-color: ${plan.textColor};">
              <p class="label" style="color: ${plan.accentColor};">最 適 合 這 樣 的 妳</p>
              <p style="color: ${plan.textColor};">${plan.bestFor}</p>
            </div>

            <div class="action-buttons">
              <button class="copy-button" style="background: ${plan.tagBg}; color: ${plan.tagText};" onclick="sendToEmail('${planId}', '${plan.name}', '${plan.title}', '${plan.subtitle}')">寄送結果到 Email</button>
              <button class="back-detail-button" onclick="goBack()">重新選擇</button>
            </div>

            <div class="confirmation" style="color: ${plan.textColor};">
              <h2>✨ 妳選了「${plan.name}」！</h2>
              <p>點「寄送結果到 Email」就能把選擇寄到妳的信箱！</p>
            </div>
          </div>
        </div>
      `;
    }

    function sendToEmail(planId, planName, title, subtitle) {
      const email = document.getElementById('userEmail').value;
      const name = document.getElementById('userName').value || '親愛的壽星';

      if (!email) {
        alert('請填寫 Email！');
        document.getElementById('userEmail').focus();
        return;
      }

      const plan = plans.find(p => p.id === planId);
      
      // 產生詳細內容
      const details = plan.details.map(d => `${d.label}：${d.value}`).join('\n\n');
      
      const emailContent = `親愛的 ${name}：

感謝妳用心選擇！

🎉 妳選了：「${planName}」

📍 ${title.replace(/\n/g, ' ')}
${subtitle}

✨ 方案詳情：
${details}

💝 ${plan.bestFor}

---
為妳精心準備 · 生日快樂 🎂
我是米米，陪你把生活過的順心有底氣`;

      // 使用 FormSubmit 寄送郵件（同時寄給壽星和米米）
      const formData = new FormData();
      formData.append('name', name);
      formData.append('email', email);
      formData.append('subject', `🎂 我選了生日方案：${planName}`);
      formData.append('message', emailContent);
      formData.append('_captcha', 'false');
      formData.append('_cc', 'vivian1999gire@gmail.com'); // 同時抄送給米米

      // 顯示寄送中
      const originalText = event.target.textContent;
      event.target.textContent = '寄送中...';
      event.target.disabled = true;

      fetch('https://formsubmit.co/ajax/' + email, {
        method: 'POST',
        body: formData
      })
      .then(response => response.json())
      .then(data => {
        alert(`✨ 成功！\n\n選擇結果已寄到：${email}\n米米也收到了妳的選擇！\n\n生日快樂 🎂💝`);
        setTimeout(() => {
          goBack();
        }, 1000);
      })
      .catch(error => {
        console.error('Error:', error);
        event.target.textContent = originalText;
        event.target.disabled = false;
        alert('❌ 寄送失敗，請重新試試\n\n或者直接複製選擇文字手動寄送');
      });
    }

    function goBack() {
      const cardsContainer = document.getElementById('cardsContainer');
      const detailView = document.getElementById('detailView');
      cardsContainer.style.display = 'grid';
      detailView.classList.remove('active');
    }

    function copySelection(name, title, subtitle) {
      const text = `我選了「${name}」！\n\n${title}\n\n${subtitle}`;
      navigator.clipboard.writeText(text).then(() => {
        alert('已複製到剪貼板 ✨');
      });
    }

    // Initialize cards
    const cardsContainer = document.getElementById('cardsContainer');
    plans.forEach(plan => {
      cardsContainer.appendChild(createCard(plan));
    });
  </script>
</body>
</html>
